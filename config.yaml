# VentoCloud 配置
# 复制此文件到项目根目录并修改配置

qq:
  account: ""              # 机器人QQ号，留空则不自动登录
  password: ""             # 密码，留空则扫码登录
  protocol: 3             # 1=手机 2=平板 3=手表 4=Mac

sign:
  url: "http://127.0.0.1:8080"   # 签名服务地址

api:
  http:
    enable: true
    host: "0.0.0.0"
    port: 3000
    secret: ""             # API 签名密钥
  
  ws:
    enable: true
    host: "0.0.0.0"
    port: 3001

webui:
  enable: true
  host: "0.0.0.0"
  port: 8080
  username: "admin"
  password: "ventocloud"   # 请修改默认密码

log:
  level: "info"